name: Bug Report
description: Report a bug with the Varnish exporter
labels: ["bug"]
body:
  - type: input
    id: varnish-version
    attributes:
      label: Varnish version
      placeholder: "e.g. 7.5.0"
    validations:
      required: true
  - type: input
    id: exporter-version
    attributes:
      label: Exporter version
      placeholder: "e.g. 1.8.3"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
    validations:
      required: false
